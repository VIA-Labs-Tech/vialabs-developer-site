# Production build (main branch) — full Docusaurus site
[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Coming soon branch — static HTML only
[context.coming-soon]
  command = "echo 'Static site, no build needed'"
  publish = "coming-soon"
