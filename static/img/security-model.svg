<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340">
  <defs>
    <pattern id="lineGridSM" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="80" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowSM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00E5E5" fill-opacity="0.7"/>
    </marker>
    <marker id="arrowSMout" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00E5E5" fill-opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="340" rx="12" fill="#0d0d0d"/>
  <rect width="960" height="340" rx="12" fill="url(#lineGridSM)"/>

  <!-- Message In -->
  <rect x="40" y="130" width="140" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="110" y="167" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">Message</text>
  <text x="110" y="191" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Source Chain</text>

  <!-- Arrows from Message to 3 layers -->
  <line x1="180" y1="145" x2="310" y2="80" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrowSM)"/>
  <line x1="180" y1="170" x2="310" y2="170" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrowSM)"/>
  <line x1="180" y1="195" x2="310" y2="260" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrowSM)"/>

  <!-- VIA Layer -->
  <rect x="320" y="40" width="280" height="70" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="460" y="72" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">VIA Layer</text>
  <text x="460" y="96" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Protocol Validation</text>

  <!-- Chain Layer -->
  <rect x="320" y="135" width="280" height="70" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="460" y="167" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">Chain Layer</text>
  <text x="460" y="191" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Native Verification</text>

  <!-- Project Layer -->
  <rect x="320" y="230" width="280" height="70" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="460" y="262" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">Project Layer</text>
  <text x="460" y="286" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Access Control</text>

  <!-- Arrows from 3 layers to Message Out -->
  <line x1="600" y1="80" x2="740" y2="145" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrowSMout)"/>
  <line x1="600" y1="170" x2="740" y2="170" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrowSMout)"/>
  <line x1="600" y1="260" x2="740" y2="195" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrowSMout)"/>

  <!-- Message Out -->
  <rect x="750" y="130" width="160" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="830" y="162" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Message</text>
  <text x="830" y="182" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Forwarded</text>
  <text x="830" y="200" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Destination</text>
</svg>
