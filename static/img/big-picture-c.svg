<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300">
  <defs>
    <!-- Faint line grid -->
    <pattern id="lineGrid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="80" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
    <!-- Arrow marker -->
    <marker id="arrowC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00E5E5" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="300" rx="12" fill="#0d0d0d"/>
  <rect width="960" height="300" rx="12" fill="url(#lineGrid)"/>

  <!-- Chain A — minimal -->
  <rect x="80" y="110" width="180" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="170" y="157" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500">Chain A</text>

  <!-- Line -->
  <line x1="260" y1="150" x2="370" y2="150" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowC)"/>

  <!-- VIA Labs — minimal center -->
  <rect x="380" y="100" width="200" height="100" rx="8" fill="none" stroke="#333333" stroke-width="1"/>
  <text x="480" y="145" text-anchor="middle" fill="#00E5E5" font-family="system-ui, -apple-system, sans-serif" font-size="12" letter-spacing="3" font-weight="400">VIA LABS</text>
  <text x="480" y="172" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500">Network</text>

  <!-- Line -->
  <line x1="580" y1="150" x2="690" y2="150" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowC)"/>

  <!-- Chain B — minimal -->
  <rect x="700" y="110" width="180" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="790" y="157" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500">Chain B</text>
</svg>
