<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300">
  <defs>
    <pattern id="lineGridHIW" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="80" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowHIW" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00E5E5" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="300" rx="12" fill="#0d0d0d"/>
  <rect width="960" height="300" rx="12" fill="url(#lineGridHIW)"/>

  <!-- Step labels -->
  <text x="120" y="80" text-anchor="middle" fill="#00E5E5" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="1" font-weight="400">STEP 1</text>
  <text x="340" y="80" text-anchor="middle" fill="#00E5E5" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="1" font-weight="400">STEP 2</text>
  <text x="560" y="80" text-anchor="middle" fill="#00E5E5" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="1" font-weight="400">STEP 3</text>
  <text x="790" y="80" text-anchor="middle" fill="#00E5E5" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="1" font-weight="400">STEP 4</text>

  <!-- Node 1: Your Contract -->
  <rect x="30" y="100" width="180" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="120" y="137" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">Your Contract</text>
  <text x="120" y="161" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">messageSend()</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="140" x2="248" y2="140" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowHIW)"/>

  <!-- Node 2: VIA Gateway -->
  <rect x="258" y="100" width="165" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="340" y="137" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">VIA Gateway</text>
  <text x="340" y="161" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Source Chain</text>

  <!-- Arrow 2 -->
  <line x1="423" y1="140" x2="465" y2="140" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowHIW)"/>

  <!-- Node 3: Validators -->
  <rect x="475" y="100" width="165" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="557" y="137" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">Validators</text>
  <text x="557" y="161" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Verify &amp; Sign</text>

  <!-- Arrow 3 -->
  <line x1="640" y1="140" x2="695" y2="140" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowHIW)"/>

  <!-- Node 4: Your Contract (destination) -->
  <rect x="705" y="100" width="180" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="795" y="137" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">Your Contract</text>
  <text x="795" y="161" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">messageProcess()</text>

  <!-- Bottom label -->
  <text x="480" y="240" text-anchor="middle" fill="#333333" font-family="system-ui, -apple-system, sans-serif" font-size="12">Source Chain  &#8594;  Off-Chain  &#8594;  Destination Chain</text>
</svg>
