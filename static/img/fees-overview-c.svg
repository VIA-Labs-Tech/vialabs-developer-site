<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280">
  <defs>
    <pattern id="lineGridFC" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="80" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="80" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowFC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00E5E5" fill-opacity="0.7"/>
    </marker>
  </defs>

  <rect width="960" height="280" rx="12" fill="#0d0d0d"/>
  <rect width="960" height="280" rx="12" fill="url(#lineGridFC)"/>

  <!-- Source Contract -->
  <rect x="100" y="80" width="220" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="210" y="117" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500">Source Chain</text>
  <text x="210" y="143" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">Your contract calls messageSend()</text>

  <!-- Main arrow -->
  <line x1="320" y1="120" x2="630" y2="120" stroke="#00E5E5" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowFC)"/>

  <!-- Cost annotations below the arrow -->
  <text x="475" y="108" text-anchor="middle" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="11">PAID BY USER</text>

  <text x="400" y="155" text-anchor="middle" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="13">Source Gas</text>
  <text x="400" y="171" text-anchor="middle" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="11">transaction cost</text>

  <text x="550" y="155" text-anchor="middle" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="13">Destination Gas</text>
  <text x="550" y="171" text-anchor="middle" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="11">paid from user at send time</text>

  <!-- Small separator dot -->
  <circle cx="475" cy="160" r="2" fill="#222222"/>

  <!-- Destination Contract -->
  <rect x="640" y="80" width="220" height="80" rx="8" fill="none" stroke="#222222" stroke-width="1"/>
  <text x="750" y="117" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500">Destination Chain</text>
  <text x="750" y="143" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12">messageProcess() executes</text>

  <!-- Bottom note -->
  <text x="480" y="230" text-anchor="middle" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="12">No protocol fees &#8226; No token requirements &#8226; No subscriptions</text>
</svg>
